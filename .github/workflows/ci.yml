name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build and smoke test in Docker
        run: |
          docker build -t nacho-tools-ci -f ci/Dockerfile .
          mkdir -p out
          docker run --rm -v "$PWD/out:/work/out" nacho-tools-ci

      - uses: actions/upload-artifact@v7
        with:
          name: tarball
          path: out/*.tgz
          if-no-files-found: error

  publish:
    needs: build-and-smoke
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for npm package provenance (OIDC token).
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: tarball
          path: out

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public out/*.tgz
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
